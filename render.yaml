services:
  - type: web
    name: solana-scalper
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRADING_MODE
        value: paper
      - key: PORT
        value: 3000
      - key: PAPER_STARTING_BALANCE
        value: 1000
      - key: MAX_POSITION_SIZE_USD
        value: 50
      - key: STOP_LOSS_PERCENT
        value: 2.5
      - key: TAKE_PROFIT_PERCENT
        value: 3.0
      - key: MAX_SLIPPAGE_BPS
        value: 150
      - key: MAX_DAILY_LOSS_USD
        value: 100
      - key: MAX_CONCURRENT_POSITIONS
        value: 3
      - key: SCAN_INTERVAL_SECONDS
        value: 15
      - key: MIN_LIQUIDITY_USD
        value: 150000
